project:
  type: book
  output-dir: _book

book:
  title: "Cambridge Central School District"
  subtitle: "Issues and comparisons"
  author: "Don Boyd"
  date: today
  chapters:
    - index.qmd
    - part: "CCS and the challenges it faces"
      chapters:
        - front/demographics.qmd
        - front/enrollment.qmd
        - front/class-size.qmd
    - part: "CCS finances"
      chapters:
        - front/spending.qmd
        - front/taxes.qmd
        - front/tax-cap.qmd
        - front/reserves.qmd
        - front/contingency-budgets.qmd
    - part: "Academic performance"
      chapters:
        - front/test-results.qmd
    - part: "Options"
      chapters:
        - front/mergers.qmd
        - front/regionalization.qmd
        - front/cuts.qmd

  appendices:
    - exploratory/class-size-all-measures.qmd
    - exploratory/spending.qmd
    - appendix/sources.qmd
    - appendix/methods.qmd
  repo-url: https://github.com/donboyd5/ccs
  repo-subdir: books/cambridge-comparisons
  repo-branch: main
  repo-actions: [source, issue]
  search: true
  page-footer:
    left: "Cambridge School District in Comparison"
    right: "Built with [Quarto](https://quarto.org/)."

  # ---------------------------------------------------------------------------
  # Reader comments (Giscus, backed by this repo's GitHub Discussions).
  # Requires Discussions enabled + the giscus app installed on donboyd5/ccs
  # (both done). repo-id / category-id are this repo's GraphQL node IDs.
  comments:
    giscus:
      repo: donboyd5/ccs
      repo-id: "R_kgDOS2yCEg"
      category: "Announcements"          # maintainer-only threads; giscus posts them
      category-id: "DIC_kwDOS2yCEs4C-51c"
      mapping: pathname                  # one discussion thread per chapter URL
      reactions-enabled: true
      input-position: bottom
      theme: light
      loading: lazy

bibliography: references.bib
csl: apa.csl

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 2
    code-fold: true
    code-tools: true
    fig-align: center
    tbl-cap-location: top
    reference-location: document   # or: block | section | margin

execute:
  echo: true
  warning: false
  message: false
  freeze: auto

jupyter: python3
