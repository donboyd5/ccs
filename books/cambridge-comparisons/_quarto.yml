project:
  type: book
  output-dir: _book

book:
  title: "Cambridge in Comparison"
  subtitle: "How Cambridge CSD compares with nearby New York school districts"
  author: "Don Boyd"
  date: today
  chapters:
    - index.qmd
    - class-sizes.qmd
    - spending.qmd
  appendices:
    - sources.qmd
  repo-url: https://github.com/donboyd5/ccs
  repo-subdir: books/cambridge-comparisons
  repo-branch: main
  repo-actions: [source, issue]
  search: true
  page-footer:
    left: "Cambridge School District in Comparison"
    right: "Built with [Quarto](https://quarto.org/)."

  # ---------------------------------------------------------------------------
  # Reader comments (Giscus, backed by this repo's GitHub Discussions).
  # Requires Discussions enabled + the giscus app installed on donboyd5/ccs
  # (both done). repo-id / category-id are this repo's GraphQL node IDs.
  comments:
    giscus:
      repo: donboyd5/ccs
      repo-id: "R_kgDOS2yCEg"
      category: "Announcements"          # maintainer-only threads; giscus posts them
      category-id: "DIC_kwDOS2yCEs4C-51c"
      mapping: pathname                  # one discussion thread per chapter URL
      reactions-enabled: true
      input-position: bottom
      theme: light
      loading: lazy

bibliography: references.bib
csl: apa.csl

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 2
    code-fold: true
    code-tools: true
    fig-align: center
    tbl-cap-location: top

execute:
  echo: true
  warning: false
  message: false

jupyter: python3
